# .github/workflows/trigger-deploy.yml
#
# When recipes are merged to main, tell foundry-platform-demo to redeploy.
#
# This sends a repository_dispatch event to PitziLabs/foundry-platform-demo,
# which triggers the full build & deploy pipeline:
#   Astro build → Docker → ECR → ECS → icecreamtofightwith.com
#
# Note: compile-book.yml handles PR validation (spell check, compile).
# This workflow handles post-merge deployment. Different triggers,
# different jobs, complementary purposes.
#
# Auth: requires a fine-grained PAT (DEPLOY_TRIGGER_PAT) with
# Contents Read+Write on foundry-platform-demo. GITHUB_TOKEN can't do
# cross-repo dispatch — it's scoped to this repo only.

name: Trigger Deploy

on:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
      - 'front_matter/**'
      - 'back_matter/**'

jobs:
  notify-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in foundry-platform-demo
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TRIGGER_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/PitziLabs/foundry-platform-demo/dispatches \
            -d '{"event_type":"recipe-updated","client_payload":{"sha":"${{ github.sha }}"}}'

          echo "✅ Deploy triggered in foundry-platform-demo"
