name: Lint content

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run linter unit tests
        run: python -m unittest discover tests

      - name: Lint content
        id: lint
        continue-on-error: true
        run: python ice_cream_linter.py --format markdown > lint-report.md

      - name: Post lint report as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ice-cream-linter
          path: lint-report.md

      - name: Fail if lint reported errors
        if: steps.lint.outcome == 'failure'
        run: |
          echo "Linter reported errors — see the PR comment for details."
          exit 1
