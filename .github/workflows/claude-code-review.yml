# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around lentago/shared-workflows/claude-review.yml.
# Pinned to Haiku.
# ============================================================================

name: Claude Code Review

# >>> DISABLED 2026-06-25: automated Claude PR review turned off fleet-wide.
# Trigger changed from `pull_request` to manual `workflow_dispatch` only, so it
# never auto-runs on PRs. The repo-specific review_prompt below is preserved.
# To re-enable, restore the `on: pull_request` trigger (see git history).
on:
  workflow_dispatch:

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: lentago/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        This repository is a markdown ice-cream cookbook ("Ice Cream to Fight
        With"): 28 custard-based recipes plus front/back matter, compiled by
        Python build scripts (`compile_book.py`, `ice_cream_linter.py`,
        `sync_recipes.py`) and served as an Astro/Nginx static site deployed
        to AWS via OIDC. Focus your review on:

        1. **Recipe & prose correctness** — ingredient/quantity/step
           consistency, technique accuracy, and adherence to `STYLE_GUIDE.md`
           (the conversational voice is intentional — don't sand it flat, but
           flag genuine errors).
        2. **Build & lint scripts** — Python correctness in `compile_book.py`,
           `ice_cream_linter.py`, `sync_recipes.py`: globbing, ordering,
           encoding, and linter rules that could silently drop or mis-order
           content.
        3. **Markdown structure** — heading hierarchy, tables, and the
           front-matter / recipe / back-matter conventions the compiler
           depends on.
        4. **Site & deploy** — Astro config, `Dockerfile` / `nginx.conf`, and
           the deploy workflow's OIDC assumptions against the
           foundry-platform-demo infrastructure.
        5. **Security** — no secrets in scripts, workflows, or committed
           build output.
